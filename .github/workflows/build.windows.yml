name: Build EXE

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 18

      - run: npm install

      - run: npm run dist

      - uses: actions/upload-artifact@v6
        with:
          name: DotCodeGUI
          path: dist/*.exe
